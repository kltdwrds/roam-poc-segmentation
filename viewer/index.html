<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Roam POC — three-pane PTv3 viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #131720;
      --panel-2: #1b212c;
      --text: #e6e9ef;
      --text-dim: #9aa3b2;
      --accent: #6aa0ff;
      --divider: #232a36;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }
    header {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 10px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--divider);
      height: 52px;
    }
    header h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: var(--text);
    }
    header h1 .dim { color: var(--text-dim); font-weight: 400; }
    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      justify-content: flex-end;
    }
    .ctrl { display: flex; align-items: center; gap: 6px; }
    .ctrl label { color: var(--text-dim); font-size: 12px; }
    .ctrl select, .ctrl input[type="range"] {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--divider);
      border-radius: 4px;
      padding: 4px 7px;
      font: inherit;
    }
    .ctrl input[type="range"] { padding: 0; width: 90px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      height: calc(100vh - 52px);
    }
    .pane {
      position: relative;
      border-right: 1px solid var(--divider);
      overflow: hidden;
    }
    .pane:last-child { border-right: 0; }
    .pane canvas { display: block; }
    .pane-label {
      position: absolute;
      top: 8px;
      left: 10px;
      padding: 4px 10px;
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--divider);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2px;
      pointer-events: none;
    }
    .pane-label .sub {
      display: block;
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 400;
      margin-top: 2px;
    }
    .pane-opacity {
      position: absolute;
      top: 8px;
      right: 10px;
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--divider);
      border-radius: 4px;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .pane-opacity input { width: 70px; }
    .status {
      position: fixed;
      bottom: 10px;
      left: 16px;
      color: var(--text-dim);
      font-size: 11px;
      pointer-events: none;
    }
    .hint {
      position: fixed;
      bottom: 10px;
      right: 16px;
      color: var(--text-dim);
      font-size: 11px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Roam POC <span class="dim">/</span> PTv3 segmentation <span class="dim">/</span> S3DIS Area-5 (held out)</h1>
  <div class="controls">
    <div class="ctrl">
      <label for="scene">scene</label>
      <select id="scene"></select>
    </div>
    <div class="ctrl">
      <label for="point-size">point size</label>
      <input type="range" id="point-size" min="0.5" max="6" step="0.1" value="1.8" />
    </div>
    <div class="ctrl">
      <label for="bg-color">bg</label>
      <select id="bg-color">
        <option value="#0b0d10" selected>dark</option>
        <option value="#181b21">slate</option>
        <option value="#000000">black</option>
        <option value="#f3f3f3">light</option>
      </select>
    </div>
  </div>
</header>

<div class="grid">
  <div class="pane" id="pane-raw">
    <div class="pane-label">raw scan <span class="sub">true color</span></div>
    <div class="pane-opacity">
      α
      <input type="range" min="0.1" max="1" step="0.05" value="1" data-pane="raw" />
    </div>
  </div>
  <div class="pane" id="pane-semantic">
    <div class="pane-label">semantic <span class="sub">PTv3 → S3DIS-13</span></div>
    <div class="pane-opacity">
      α
      <input type="range" min="0.1" max="1" step="0.05" value="1" data-pane="semantic" />
    </div>
  </div>
  <div class="pane" id="pane-permanent">
    <div class="pane-label">permanent only <span class="sub">walls / floor / ceiling / fixtures</span></div>
    <div class="pane-opacity">
      α
      <input type="range" min="0.1" max="1" step="0.05" value="1" data-pane="permanent" />
    </div>
  </div>
</div>

<div class="status" id="status">loading…</div>
<div class="hint">drag = orbit · scroll = zoom · right-drag = pan · shared camera</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
    }
  }
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { PLYLoader } from "three/addons/loaders/PLYLoader.js";

// Manifest of available scenes (folder name under outputs/day2_final/).
// Each scene has scene_raw.ply, scene_semantic.ply, scene_permanent.ply.
const SCENES = [
  { id: "Area_5-conferenceRoom_1", label: "conferenceRoom_1 (perm-heavy)" },
  { id: "Area_5-office_3",        label: "office_3 (perm/trans balanced)" },
];

const PANES = ["raw", "semantic", "permanent"];

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const renderers = {};
const scenes = {};
const cameras = {};
const controls = {};
const meshes = {};   // pane -> THREE.Points
const grids = {};    // pane -> THREE.GridHelper
const ambientLights = {};

let pointSize = 1.8;
let bgColor = new THREE.Color("#0b0d10");
let sharedCameraEnabled = true;

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
function makePaneRenderer(paneEl) {
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(paneEl.clientWidth, paneEl.clientHeight);
  renderer.setClearColor(bgColor, 1);
  paneEl.appendChild(renderer.domElement);
  return renderer;
}

function init() {
  // Build identical camera/scene for each pane.
  for (const p of PANES) {
    const paneEl = document.getElementById(`pane-${p}`);
    const renderer = makePaneRenderer(paneEl);
    const scene = new THREE.Scene();
    scene.background = bgColor.clone();
    const cam = new THREE.PerspectiveCamera(45, paneEl.clientWidth / paneEl.clientHeight, 0.05, 500);
    cam.position.set(8, 6, 8);
    cam.up.set(0, 0, 1); // S3DIS data has z as vertical
    cam.lookAt(0, 0, 1);

    // Subtle grid centered at origin, on the floor plane (z = 0).
    const grid = new THREE.GridHelper(20, 20, 0x303644, 0x1d2230);
    grid.rotation.x = Math.PI / 2; // GridHelper is XZ; we want XY → rotate
    grid.position.z = 0;
    scene.add(grid);
    grids[p] = grid;

    // Tiny ambient just so anything that becomes lit doesn't go black.
    const amb = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(amb);
    ambientLights[p] = amb;

    renderers[p] = renderer;
    scenes[p] = scene;
    cameras[p] = cam;

    const ctrl = new OrbitControls(cam, renderer.domElement);
    ctrl.target.set(0, 0, 1);
    ctrl.enableDamping = true;
    ctrl.dampingFactor = 0.08;
    controls[p] = ctrl;
  }

  // Sync cameras across panes via OrbitControls 'change'.
  for (const p of PANES) {
    controls[p].addEventListener("change", () => syncCamerasFrom(p));
  }

  // Populate scene picker
  const sel = document.getElementById("scene");
  for (const s of SCENES) {
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.label;
    sel.appendChild(opt);
  }
  sel.addEventListener("change", () => loadScene(sel.value));

  // Point-size slider
  document.getElementById("point-size").addEventListener("input", (e) => {
    pointSize = parseFloat(e.target.value);
    for (const p of PANES) {
      if (meshes[p]) meshes[p].material.size = pointSize;
    }
  });

  // BG color
  document.getElementById("bg-color").addEventListener("change", (e) => {
    bgColor = new THREE.Color(e.target.value);
    for (const p of PANES) {
      renderers[p].setClearColor(bgColor, 1);
      scenes[p].background = bgColor.clone();
    }
  });

  // Per-pane opacity sliders
  for (const inp of document.querySelectorAll("input[data-pane]")) {
    inp.addEventListener("input", (e) => {
      const pane = e.target.dataset.pane;
      const a = parseFloat(e.target.value);
      if (meshes[pane]) {
        meshes[pane].material.opacity = a;
        meshes[pane].material.transparent = a < 1;
      }
    });
  }

  window.addEventListener("resize", onResize);
  loadScene(SCENES[0].id);
  animate();
}

function syncCamerasFrom(src) {
  if (!sharedCameraEnabled) return;
  const srcCam = cameras[src];
  const srcCtl = controls[src];
  for (const p of PANES) {
    if (p === src) continue;
    cameras[p].position.copy(srcCam.position);
    cameras[p].quaternion.copy(srcCam.quaternion);
    cameras[p].zoom = srcCam.zoom;
    cameras[p].updateProjectionMatrix();
    controls[p].target.copy(srcCtl.target);
    controls[p].update();
  }
}

function onResize() {
  for (const p of PANES) {
    const paneEl = document.getElementById(`pane-${p}`);
    const w = paneEl.clientWidth, h = paneEl.clientHeight;
    cameras[p].aspect = w / h;
    cameras[p].updateProjectionMatrix();
    renderers[p].setSize(w, h);
  }
}

function animate() {
  requestAnimationFrame(animate);
  for (const p of PANES) {
    controls[p].update();
    renderers[p].render(scenes[p], cameras[p]);
  }
}

// ---------------------------------------------------------------------------
// PLY loading & framing
// ---------------------------------------------------------------------------
const loader = new PLYLoader();

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function loadPLY(url) {
  return new Promise((resolve, reject) => {
    loader.load(url, (geom) => resolve(geom), undefined, (e) => reject(e));
  });
}

function disposeMesh(p) {
  if (!meshes[p]) return;
  scenes[p].remove(meshes[p]);
  meshes[p].geometry.dispose();
  meshes[p].material.dispose();
  meshes[p] = null;
}

async function loadScene(sceneId) {
  setStatus(`loading ${sceneId} …`);
  // Path: scenes/<sceneId>/scene_{raw,semantic,permanent}.ply
  // The viewer/ directory has a `scenes/` symlink pointing at
  // ../outputs/day2_final/ so it works under `python -m http.server -d viewer/`
  // which blocks `..` traversal.
  const base = `scenes/${sceneId}`;
  const tasks = {
    raw:        loadPLY(`${base}/scene_raw.ply`),
    semantic:   loadPLY(`${base}/scene_semantic.ply`),
    permanent:  loadPLY(`${base}/scene_permanent.ply`),
  };

  // Use the raw cloud's bounding box to set camera/orbit target for all panes.
  let framingDone = false;
  for (const p of PANES) {
    try {
      const geom = await tasks[p];
      disposeMesh(p);

      // Recenter to origin so grid + camera lineup is identical across panes.
      geom.computeBoundingBox();
      const c = new THREE.Vector3();
      geom.boundingBox.getCenter(c);
      geom.translate(-c.x, -c.y, geom.boundingBox.min.z * -1 + 0); // floor → z=0

      const mat = new THREE.PointsMaterial({
        size: pointSize,
        sizeAttenuation: false,
        vertexColors: true,
        transparent: false,
        depthWrite: true,
      });
      const points = new THREE.Points(geom, mat);
      scenes[p].add(points);
      meshes[p] = points;

      if (!framingDone) {
        geom.computeBoundingBox();
        const size = new THREE.Vector3();
        geom.boundingBox.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const target = new THREE.Vector3(0, 0, size.z / 2);
        const cam = cameras[p];
        const distance = maxDim * 1.3;
        cam.position.set(distance, -distance, distance * 0.9);
        cam.up.set(0, 0, 1);
        cam.lookAt(target);
        controls[p].target.copy(target);
        controls[p].update();
        syncCamerasFrom(p);
        framingDone = true;
      }
    } catch (err) {
      console.error(`failed to load ${p} for ${sceneId}`, err);
      setStatus(`error loading ${p} for ${sceneId}: ${err.message || err}`);
      return;
    }
  }
  const counts = PANES.map(p => meshes[p].geometry.attributes.position.count);
  setStatus(`${sceneId} · raw ${counts[0].toLocaleString()} · sem ${counts[1].toLocaleString()} · perm ${counts[2].toLocaleString()}`);
}

init();
</script>

</body>
</html>
